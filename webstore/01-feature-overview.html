<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #E8F5E9 0%, #A5D6A7 50%, #66BB6A 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
  }
  .icon-area {
    display: flex; align-items: center; gap: 32px;
  }
  .icon-box {
    width: 160px; height: 160px;
    background: white;
    border-radius: 32px;
    box-shadow: 0 12px 40px rgba(27, 94, 32, 0.25);
    display: flex; align-items: center; justify-content: center;
  }
  .title {
    font-size: 56px; font-weight: 800;
    color: #1B5E20;
    text-shadow: 0 2px 8px rgba(27, 94, 32, 0.15);
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 28px; font-weight: 500;
    color: #2E7D32;
    opacity: 0.85;
  }
  .features {
    display: flex; gap: 36px; margin-top: 12px;
  }
  .feature {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255, 0.7);
    padding: 16px 28px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .feature-icon { font-size: 32px; }
  .feature-text { font-size: 20px; font-weight: 600; color: #2E7D32; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-area">
      <div class="icon-box">
        <img src="../icons/icon.svg" width="110" height="110" alt="">
      </div>
      <div class="title">いろいろMDコピー</div>
    </div>
    <div class="subtitle">PRのタイトル・本文・レビューコメントをMarkdownでダウンロード</div>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">📋</span>
        <span class="feature-text">ワンクリックコピー</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📥</span>
        <span class="feature-text">MDファイルダウンロード</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔄</span>
        <span class="feature-text">GitHub & DevOps対応</span>
      </div>
    </div>
  </div>
</body>
</html>
