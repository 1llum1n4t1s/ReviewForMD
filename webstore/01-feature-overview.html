<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #E8F5E9 0%, #A5D6A7 50%, #66BB6A 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
  }
  .icon-area {
    display: flex; align-items: center; gap: 32px;
  }
  .icon-box {
    width: 160px; height: 160px;
    background: white;
    border-radius: 32px;
    box-shadow: 0 12px 40px rgba(27, 94, 32, 0.25);
    display: flex; align-items: center; justify-content: center;
  }
  .title {
    font-size: 56px; font-weight: 800;
    color: #1B5E20;
    text-shadow: 0 2px 8px rgba(27, 94, 32, 0.15);
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 28px; font-weight: 500;
    color: #2E7D32;
    opacity: 0.85;
  }
  .features {
    display: flex; gap: 36px; margin-top: 12px;
  }
  .feature {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255, 0.7);
    padding: 16px 28px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .feature-icon { font-size: 32px; }
  .feature-text { font-size: 20px; font-weight: 600; color: #2E7D32; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-area">
      <div class="icon-box">
        <svg width="110" height="110" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2da44e"/>
              <stop offset="100%" style="stop-color:#116329"/>
            </linearGradient>
          </defs>
          <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
          <rect x="120" y="104" width="272" height="320" rx="20" fill="none" stroke="#fff" stroke-width="14" stroke-opacity="0.95"/>
          <rect x="192" y="76" width="128" height="54" rx="12" fill="#fff" fill-opacity="0.95"/>
          <rect x="222" y="64" width="68" height="24" rx="12" fill="#1a7f37"/>
          <text x="163" y="198" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#fff" opacity="0.95">#</text>
          <rect x="193" y="180" width="148" height="18" rx="4" fill="#fff" opacity="0.75"/>
          <rect x="163" y="220" width="192" height="10" rx="3" fill="#fff" opacity="0.4"/>
          <rect x="163" y="240" width="156" height="10" rx="3" fill="#fff" opacity="0.35"/>
          <rect x="163" y="272" width="5" height="42" rx="2.5" fill="#fff" opacity="0.85"/>
          <rect x="180" y="274" width="168" height="10" rx="3" fill="#fff" opacity="0.5"/>
          <rect x="180" y="294" width="128" height="10" rx="3" fill="#fff" opacity="0.45"/>
          <rect x="340" y="86" width="66" height="34" rx="8" fill="#fff" fill-opacity="0.95"/>
          <text x="373" y="110" font-family="Arial,sans-serif" font-size="21" font-weight="bold" fill="#116329" text-anchor="middle">MD</text>
        </svg>
      </div>
      <div class="title">プルリクMDコピー</div>
    </div>
    <div class="subtitle">PRのタイトル・本文・レビューコメントをMarkdownでダウンロード</div>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">📋</span>
        <span class="feature-text">ワンクリックコピー</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📥</span>
        <span class="feature-text">MDファイルダウンロード</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔄</span>
        <span class="feature-text">GitHub & DevOps対応</span>
      </div>
    </div>
  </div>
</body>
</html>
