<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1400px; height: 560px;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #43A047 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .bg-circle {
    position: absolute; border-radius: 50%; opacity: 0.06;
    background: white;
  }
  .bg-circle.c1 { width: 500px; height: 500px; top: -150px; right: -50px; }
  .bg-circle.c2 { width: 350px; height: 350px; bottom: -120px; left: -60px; }
  .container {
    display: flex; align-items: center; gap: 64px;
    z-index: 1;
  }
  .icon-wrap {
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.15);
    border-radius: 48px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .text-area {
    display: flex; flex-direction: column; gap: 20px;
  }
  .title {
    font-size: 56px; font-weight: 900; color: white;
    letter-spacing: 3px;
  }
  .desc {
    font-size: 26px; color: rgba(255,255,255,0.9);
    line-height: 1.5;
  }
  .tags {
    display: flex; gap: 16px; margin-top: 4px;
  }
  .tag {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 10px 24px;
    font-size: 18px; font-weight: 600; color: white;
  }
</style>
</head>
<body>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="container">
    <div class="icon-wrap">
      <img src="../icons/icon.svg" width="130" height="130" alt="いろいろMDコピー アイコン">
    </div>
    <div class="text-area">
      <div class="title">いろいろMDコピー</div>
      <div class="desc">PR・会議録画・Teamsチャットを MD / VTT / ZIP でワンクリック保存。<br>GitHub / DevOps / CodeCommit / SharePoint / Teams 対応の軽量拡張機能。</div>
      <div class="tags">
        <div class="tag">📋 PR → Markdown</div>
        <div class="tag">🎥 会議 → VTT</div>
        <div class="tag">💬 Teams → MD / ZIP</div>
      </div>
    </div>
  </div>
</body>
</html>
