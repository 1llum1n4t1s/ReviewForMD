name: Publish to Web Stores (CWS + AMO)

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # SHA ピン留め: タグは mutable なため（タグ書き換え型の供給チェーン攻撃対策）。
        # SHA 取得手順: `gh api repos/actions/checkout/git/ref/tags/v5`
        # バージョン更新時は SHA を取り直して追記コメントも合わせる。
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: zip パッケージを作成
        run: |
          zip -r ReviewForMD.zip manifest.json src icons \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh ReviewForMD.zip

      - name: Chrome Web Store にアップロード & 公開
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          # パッチ固定: npm maintainer アカウント侵害でも CWS 秘密情報を守るため、
          # メジャータグ (`@3`) ではなくパッチ固定する。最新版への追随は手動 PR で。
          npx --yes chrome-webstore-upload-cli@3.5.0 upload \
            --source ReviewForMD.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
          echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"

  # CWS ジョブとは独立（needs なし）。片方のストアが失敗しても、もう片方の公開は止まらない。
  publish-firefox:
    name: Firefox AMO 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # SHA ピン留め: タグは mutable なため（タグ書き換え型の供給チェーン攻撃対策）。
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          expected="release/${version}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($version) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "📦 公開対象バージョン: $version"

      - name: Firefox 用ソースを準備
        run: |
          # 拡張本体だけを staging に集める（webstore/ docs/ .github/ 等は含めない）。
          # manifest.json は Chrome と共有（browser_specific_settings.gecko を Firefox が読む）。
          mkdir -p build-firefox
          cp manifest.json build-firefox/
          cp -r src icons build-firefox/
          ls -R build-firefox | head -40

      - name: AMO へ署名 & 提出（listed）
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          # パッチ固定: 供給チェーン対策（最新追随は手動 PR）。
          # 初回のみ AMO Developer Hub での add-on 登録が必要（listing 情報の事前登録）。
          # 登録後は本ジョブが新バージョンを listed channel に自動提出する。
          npx --yes web-ext@10.3.0 sign \
            --source-dir=build-firefox \
            --channel=listed \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
          echo "🦊 Firefox AMO への提出リクエストを送信したよ〜"
